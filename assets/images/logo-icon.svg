<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="50%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
  </defs>
  <!-- Outer ring (Red - Unknown Unknowns) -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.3" />
  <!-- Middle ring (Yellow - Known Unknowns) -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#eab308" stroke-width="1.5" opacity="0.5" />
  <!-- Inner ring (Green - Known Knowns) -->
  <circle cx="32" cy="32" r="10" fill="none" stroke="#22c55e" stroke-width="2" />
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2" fill="#22c55e" />
  <!-- Arrow (transformation) -->
  <line x1="50" y1="14" x2="56" y2="8" stroke="#22c55e" stroke-width="1.5" />
  <polygon points="56,8 52,6 54,11" fill="#22c55e" />
