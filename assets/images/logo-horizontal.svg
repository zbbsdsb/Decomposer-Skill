<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 64" width="400" height="64">
  <defs>
    <style>
      .logo-text { fill: #f5f5f0; font-family: 'Inter', -apple-system, sans-serif; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
      .logo-sub { fill: #666; font-family: 'Inter', -apple-system, sans-serif; font-size: 10px; letter-spacing: 2px; }
    </style>
  </defs>
  <!-- Rings -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.3" />
  <circle cx="32" cy="32" r="20" fill="none" stroke="#eab308" stroke-width="1.5" opacity="0.5" />
  <circle cx="32" cy="32" r="10" fill="none" stroke="#22c55e" stroke-width="2" />
  <circle cx="32" cy="32" r="2" fill="#22c55e" />
  <!-- Arrow -->
  <line x1="50" y1="14" x2="56" y2="8" stroke="#22c55e" stroke-width="1.5" />
  <polygon points="56,8 52,6 54,11" fill="#22c55e" />
  <!-- Text -->
  <text x="80" y="38" class="logo-text">Decomposer</text>
  <text x="80" y="54" class="logo-sub">UNKNOWN → KNOWN</text>
